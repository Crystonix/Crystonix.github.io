      <rect x="384" y="0" width="96" height="96" rx="18"/>
      <rect x="480" y="96" width="96" height="96" rx="18"/>
      <rect x="0" y="192" width="96" height="96" rx="18"/>
      <rect x="576" y="192" width="96" height="96" rx="18"/>
      <rect x="96" y="384" width="96" height="96" rx="18"/>
      <rect x="480" y="480" width="96" height="96" rx="18"/>
    </g>
    <g fill="#7dd3fc" opacity="0.9">
      <rect x="96" y="96" width="96" height="96" rx="20"/>
      <rect x="192" y="96" width="96" height="96" rx="20"/>
      <rect x="288" y="96" width="96" height="96" rx="20"/>
      <rect x="384" y="96" width="96" height="96" rx="20"/>
      <rect x="96" y="192" width="96" height="96" rx="20"/>
      <rect x="288" y="192" width="96" height="96" rx="20"/>
      <rect x="384" y="192" width="96" height="96" rx="20"/>
      <rect x="480" y="192" width="96" height="96" rx="20"/>
      <rect x="96" y="288" width="96" height="96" rx="20"/>
      <rect x="192" y="288" width="96" height="96" rx="20"/>
      <rect x="288" y="288" width="96" height="96" rx="20"/>
      <rect x="384" y="288" width="96" height="96" rx="20"/>
      <rect x="192" y="384" width="96" height="96" rx="20"/>
      <rect x="288" y="384" width="96" height="96" rx="20"/>
      <rect x="384" y="384" width="96" height="96" rx="20"/>
      <rect x="288" y="480" width="96" height="96" rx="20"/>
