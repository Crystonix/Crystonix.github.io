<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Godot dungeon generation thumbnail</title>
  <desc id="desc">A stylized cellular automata cave-generation thumbnail with noisy grid cells forming a dungeon shape.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.52" stop-color="#071527"/>
      <stop offset="1" stop-color="#092f35"/>
    </linearGradient>
    <radialGradient id="glow" cx="55%" cy="44%" r="65%">
      <stop offset="0" stop-color="#7dd3fc" stop-opacity="0.28"/>
      <stop offset="0.42" stop-color="#22c55e" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#7dd3fc" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>
  <g transform="translate(224 88)" opacity="0.98">
    <g fill="#0f172a" stroke="#164e63" stroke-width="2">
