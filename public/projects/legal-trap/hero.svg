    <text x="0" y="82" fill="#edf2ff" font-family="Inter, Arial, sans-serif" font-size="94" font-weight="900" letter-spacing="-4">The Legal Trap</text>
    <text x="4" y="138" fill="#aeb9cf" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="650">modeling · compositing · team production</text>
