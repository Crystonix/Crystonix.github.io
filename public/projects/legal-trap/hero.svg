      <rect x="168" y="55" width="24" height="650" rx="12"/>
      <rect x="248" y="55" width="24" height="650" rx="12"/>
      <rect x="328" y="55" width="24" height="650" rx="12"/>
      <rect x="408" y="55" width="24" height="650" rx="12"/>
