<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">The Legal Trap hero thumbnail</title>
  <desc id="desc">A wide stylized cinematic hero thumbnail for the Legal Trap animation with warm stage light and geometric trap bars.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#030712"/>
      <stop offset="0.5" stop-color="#171022"/>
      <stop offset="1" stop-color="#33101d"/>
    </linearGradient>
    <radialGradient id="stage" cx="58%" cy="44%" r="58%">
      <stop offset="0" stop-color="#fed7aa" stop-opacity="0.48"/>
      <stop offset="0.38" stop-color="#fb7185" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0.42"/>
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
